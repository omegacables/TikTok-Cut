<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TikTok-Cut</title>
<style>
  :root{
    --accent:#ff2d55; --accent2:#25f4ee; --bg:#0e0f13; --surface:#15171d;
    --text:#f4f5f7; --muted:#8b909b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
    font-family:"Segoe UI","Yu Gothic UI",sans-serif;color:var(--text);
    -webkit-user-select:none;user-select:none;}
  .wrap{position:relative;width:100%;height:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:22px;
    background:radial-gradient(120% 80% at 50% 0%, #1b1d26 0%, var(--bg) 60%);}

  /* 背景でゆっくり泳ぐ光の玉 */
  .blob{position:absolute;border-radius:50%;filter:blur(38px);opacity:.45;z-index:0;}
  .blob.a{width:240px;height:240px;background:var(--accent);top:-60px;left:-50px;animation:float1 7s ease-in-out infinite;}
  .blob.b{width:220px;height:220px;background:var(--accent2);bottom:-70px;right:-50px;animation:float2 8s ease-in-out infinite;}
  @keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}
  @keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-36px,-26px)}}

  /* 縦型スマホ枠＝アプリの象徴。中で「切り抜き」が踊る */
  .phone{position:relative;z-index:1;width:118px;height:210px;border-radius:20px;
    background:linear-gradient(160deg,#21242e,#15171d);
    border:2px solid rgba(255,255,255,.10);
    box-shadow:0 18px 50px rgba(0,0,0,.55), 0 0 0 6px rgba(255,45,85,.05);
    overflow:hidden;animation:rise .9s cubic-bezier(.2,.9,.25,1) both;}
  @keyframes rise{from{opacity:0;transform:translateY(18px) scale(.92)}to{opacity:1;transform:none}}
  .phone .notch{position:absolute;top:8px;left:50%;transform:translateX(-50%);
    width:38px;height:5px;border-radius:3px;background:rgba(255,255,255,.18);}
  /* 中を流れるカラフルな帯＝映像 */
  .reel{position:absolute;inset:16px 0 38px;display:flex;flex-direction:column;
    animation:scroll 2.4s linear infinite;}
  .reel span{height:30px;margin:4px 12px;border-radius:6px;opacity:.92;}
  .reel span:nth-child(1){background:linear-gradient(90deg,#ff2d55,#ff7ab6)}
  .reel span:nth-child(2){background:linear-gradient(90deg,#25f4ee,#3a8dff)}
  .reel span:nth-child(3){background:linear-gradient(90deg,#ffe600,#ff9d00)}
  .reel span:nth-child(4){background:linear-gradient(90deg,#7c4dff,#b06bff)}
  .reel span:nth-child(5){background:linear-gradient(90deg,#27e36b,#13c2c2)}
  .reel span:nth-child(6){background:linear-gradient(90deg,#ff2d55,#ff7ab6)}
  @keyframes scroll{from{transform:translateY(0)}to{transform:translateY(-68px)}}
  /* 下部の字幕バー＝この製品の主役 */
  .cap{position:absolute;left:8px;right:8px;bottom:10px;height:18px;border-radius:5px;
    background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.12);
    display:flex;align-items:center;justify-content:center;}
  .cap i{display:block;width:60%;height:6px;border-radius:3px;
    background:linear-gradient(90deg,#fff,rgba(255,255,255,.3));
    animation:type 1.6s ease-in-out infinite;}
  @keyframes type{0%,100%{width:30%}50%{width:72%}}
  /* キラッと走る光 */
  .phone::after{content:"";position:absolute;top:0;left:-60%;width:50%;height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.18),transparent);
    transform:skewX(-18deg);animation:shine 2.8s ease-in-out infinite;}
  @keyframes shine{0%{left:-60%}45%,100%{left:130%}}

  .brand{z-index:1;font-size:1.7rem;font-weight:800;letter-spacing:.5px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    animation:rise .9s .1s both;}
  .bar{z-index:1;width:210px;height:6px;border-radius:4px;overflow:hidden;
    background:rgba(255,255,255,.10);}
  .bar i{display:block;width:40%;height:100%;border-radius:4px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    animation:slide 1.25s ease-in-out infinite;}
  @keyframes slide{0%{margin-left:-42%}100%{margin-left:104%}}
  .tip{z-index:1;height:1.1em;font-size:.82rem;color:var(--muted);text-align:center;
    transition:opacity .35s;min-width:260px;}
  .ver{position:absolute;bottom:12px;z-index:1;font-size:.7rem;color:#5a5f6b;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="blob a"></div><div class="blob b"></div>
    <div class="phone">
      <div class="notch"></div>
      <div class="reel"><span></span><span></span><span></span><span></span><span></span><span></span></div>
      <div class="cap"><i></i></div>
    </div>
    <div class="brand">TikTok&#8209;Cut</div>
    <div class="bar"><i></i></div>
    <div class="tip" id="tip">AIエンジンを起動しています…</div>
    <div class="ver" id="ver"></div>
  </div>
<script>
  const tips = [
    "AIエンジンを起動しています…",
    "音声認識モデルを準備しています…",
    "初回は数分かかることがあります（次回からは速くなります）",
    "ffmpeg を初期化しています…",
    "もうすぐ準備完了です ✨",
  ];
  let i = 0;
  const el = document.getElementById('tip');
  setInterval(() => {
    el.style.opacity = 0;
    setTimeout(() => { i = (i + 1) % tips.length; el.textContent = tips[i]; el.style.opacity = 1; }, 350);
  }, 2600);
  // バージョンは loadFile の query で受け取る（preload 不要）。失敗しても無害。
  try {
    const v = new URLSearchParams(location.search).get('v');
    if (v) document.getElementById('ver').textContent = 'v' + v;
  } catch (_) {}
</script>
</body>
</html>
